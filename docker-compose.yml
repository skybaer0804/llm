services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LITELLM_URL=http://litellm:4000
      - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      - litellm
    restart: unless-stopped

  litellm:
    build: .
    command: litellm --config /app/litellm/config.yaml --port 4000 --host 0.0.0.0
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    restart: unless-stopped
